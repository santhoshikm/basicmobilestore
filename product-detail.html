    function loadDetails() {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');
      const product = phoneData[productId];
      const container = document.getElementById('product-content');

      if (!product) {
        container.innerHTML = "<h2>Product not found</h2><a href='products.html' class='btn btn-primary'>Back to Products</a>";
        return;
      }

      document.title = `${product.name} | Mobile Express`;

      let specsHtml = '';
      for (const [key, value] of Object.entries(product.specs)) {
        specsHtml += `
          <div class="spec-item">
            <span class="spec-label">${key.toUpperCase()}</span>
            <span class="spec-value">${value}</span>
          </div>
        `;
      }

      container.innerHTML = `
        <div class="detail-gallery">
          <img src="${product.img}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/600x500?text=${product.name}'">
        </div>
        <div class="detail-info">
          <span class="eyebrow">${product.brand}</span>
          <h1>${product.name}</h1>
          <span class="price">${product.price}</span>
          <p>${product.desc}</p>
          
          <div class="specs-list">
            <h3>Technical Specifications</h3>
            ${specsHtml}
          </div>
          
          <div class="hero-actions">
            <button class="btn btn-primary">Add to Cart</button>
            <a href="compare.html" class="btn btn-outline">Compare This</a>
          </div>
        </div>
      `;
    }

    window.onload = loadDetails;
  </script>
